<!DOCTYPE html>
<html lang="en">
<head>
  {%load static%}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.cart-item {
    display: flex;
    justify-content: space-between;
    margin: 10px;
  }
  .cart-item img {
    width: 50px;
    height: 50px;
  }
  .button {
    padding: 5px 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
    height: 50px;
    width: 100px;
    border-radius: 5px;
    margin-left: 800px;
  }
  .button:active {
    transform: scale(0.95);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); 
  }
  .buttons{
    padding: 5px 10px;
    background-color: red;
    color: white;
    border: none;
    cursor: pointer;
  }
  .buttons:active {
    transform: scale(0.95);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); 
  }
  .input-box {
    width: 50px;
    height: 30px;
  }
  .customer-details {
    margin-top: 20px;
  }
  #name{
    height: 50px;
    width: 1000px;
    margin-left: 20px;
  }
  #address{
    height: 50px;
    width: 1000px;
    margin-left:20px;
  }
  #email{
    height: 50px;
    width: 1000px;
    margin-left:35px;
  }
  #contactNumber{
    height: 50px;
    width: 200px;
  }
  #card-number{
    height: 50px;
    width: 200px;
  }
  #security-code{
    height: 50px;
    width: 200px;
  }
  .custom-input {
    width: 300px;
    padding: 10px;
    border: 1px solid #aaa;
    border-radius: 5px;
    font-size: 16px;
}

</style>
<body>
    <h1>Your Cart</h1>
  
    <div id="cart-items"></div>
  
    <div>
      <p>Total Quantity: <span id="total-quantity">0</span></p>
      <p>Total Price: ₹<span id="total-price">0</span></p>
    </div>
    
<form method="POST" style="margin: 20px;">
        {% csrf_token %}
        {{ form.as_p }}
    <button onclick="showAlert()">Sumbit</button>
</form>
<script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function updateCartDisplay() {
      const cartItemsContainer = document.getElementById('cart-items');
      cartItemsContainer.innerHTML = '';
      
      let totalQuantity = 0;
      let totalPrice = 0;
      
      cart.forEach((item, index) => {
        const cartItemDiv = document.createElement('div');
        cartItemDiv.className = 'cart-item';
        
        cartItemDiv.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <span>${item.name}</span>
          <span>₹${item.price}</span>
          <input type="number" class="input-box" value="${item.quantity}" onchange="updateQuantity(${index}, this.value)">
          <button class="buttons" onclick="removeFromCart(${index})">Remove</button>
        `;
        
        cartItemsContainer.appendChild(cartItemDiv);
        
        totalQuantity += item.quantity;
        totalPrice += item.price * item.quantity;
      });
      
      document.getElementById('total-quantity').innerText = totalQuantity;
      document.getElementById('total-price').innerText = totalPrice.toFixed(2);
    }

    function updateQuantity(index, newQuantity) {
      cart[index].quantity = parseInt(newQuantity);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartDisplay();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartDisplay();
    }

    function placeOrder() {
      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }

      document.getElementById('customer-details-form').style.display = 'block';
    }

    function submitOrder(event) {
      event.preventDefault();
      
      const name = document.getElementById('name').value;
      const address = document.getElementById('address').value;
      const email = document.getElementById('email').value;
      const contactNumber = document.getElementById('contactNumber').value;

      
      alert('Your order has been placed successfully!');
      
      localStorage.removeItem('cart');
      
        
    }

    updateCartDisplay();

    document.addEventListener('DOMContentLoaded', function() {
    const codRadio = document.getElementById('cod');
    const creditCardRadio = document.getElementById('credit-card');
    const creditCardInfoDiv = document.getElementById('credit-card-info');
    
    function toggleCreditCardFields() {
        if (creditCardRadio.checked) {
            creditCardInfoDiv.style.display = 'block';
        } else {
            creditCardInfoDiv.style.display = 'none';
        }
    }

    codRadio.addEventListener('change', toggleCreditCardFields);
    creditCardRadio.addEventListener('change', toggleCreditCardFields);
    
    toggleCreditCardFields();

});

function showAlert() {
    alert("Your order was placed successfully!");
    setTimeout(function() {
        window.location.href = "/e";
    }, 100);  
}
  </script>
</body>
</html>
